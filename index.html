<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Srivenkateshwar — Under construction</title>
<meta name="description" content="Personal site of Srivenkateshwar — under development. Read the blog in the meantime.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #232B3E;
    --navy-deep: #1A2130;
    --steel: #3B4459;
    --mist: #A9B2C6;
    --paper: #F2F3F6;
    --accent: #E8734F;
    --red: #C6402E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--navy);
    color: var(--paper);
    font-family: "IBM Plex Mono", monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .scene { width: min(420px, 82vw); margin-bottom: 40px; }
  .scene svg { width: 100%; height: auto; display: block; }

  h1 {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(26px, 5vw, 38px);
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }
  .status {
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
  }
  .status .dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: 1px;
  }
  .note {
    font-size: 14.5px;
    line-height: 1.8;
    color: var(--mist);
    max-width: 34em;
    margin-bottom: 34px;
  }
  .blog-btn {
    display: inline-block;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: #FFFFFF;
    background: var(--red);
    text-decoration: none;
    padding: 14px 30px;
    border-radius: 999px;
    transition: transform 0.15s, background 0.15s;
  }
  .blog-btn:hover { background: var(--accent); transform: translateY(-2px); }
  .blog-btn:focus-visible { outline: 2px solid #FFFFFF; outline-offset: 3px; }
  .blog-sub { margin-top: 14px; font-size: 12.5px; color: var(--mist); letter-spacing: 0.06em; }

  footer {
    margin-top: 56px;
    font-size: 12px;
    color: var(--steel);
    letter-spacing: 0.08em;
  }
  footer a { color: var(--mist); }

  @media (prefers-reduced-motion: no-preference) {
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes spinR { to { transform: rotate(-360deg); } }
    @keyframes arm   { 0%,100% { transform: rotate(-14deg); } 50% { transform: rotate(10deg); } }
    @keyframes fore  { 0%,100% { transform: rotate(20deg); } 50% { transform: rotate(-8deg); } }
    @keyframes blink { 0%, 78%, 100% { opacity: 1; } 82%, 96% { opacity: 0.15; } }
    @keyframes spark { 0%, 100% { opacity: 0; } 45%, 55% { opacity: 1; } }
    .gear-big    { animation: spin 9s linear infinite; }
    .gear-small  { animation: spinR 6s linear infinite; }
    .arm-upper   { animation: arm 4s ease-in-out infinite; }
    .arm-fore    { animation: fore 4s ease-in-out infinite; }
    .beacon      { animation: blink 3s linear infinite; }
    .spark       { animation: spark 4s ease-in-out infinite; }
  }
  .gear-big   { transform-origin: 150px 150px; }
  .gear-small { transform-origin: 258px 96px; }
  .arm-upper  { transform-origin: 470px 240px; }
  .arm-fore   { transform-origin: 470px 130px; }
</style>
</head>
<body>

<div class="scene" role="img" aria-label="Animated scene of turning gears and a robot arm at work — the site is being built">
<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- ground line -->
  <line x1="30" y1="286" x2="570" y2="286" stroke="#3B4459" stroke-width="2" stroke-linecap="round"/>

  <!-- big gear -->
  <g class="gear-big">
    <g fill="#3B4459">
      <rect x="141" y="70" width="18" height="26" rx="4"/>
      <rect x="141" y="204" width="18" height="26" rx="4"/>
      <rect x="70" y="141" width="26" height="18" rx="4"/>
      <rect x="204" y="141" width="26" height="18" rx="4"/>
      <rect x="141" y="70" width="18" height="26" rx="4" transform="rotate(45 150 150)"/>
      <rect x="141" y="204" width="18" height="26" rx="4" transform="rotate(45 150 150)"/>
      <rect x="70" y="141" width="26" height="18" rx="4" transform="rotate(45 150 150)"/>
      <rect x="204" y="141" width="26" height="18" rx="4" transform="rotate(45 150 150)"/>
    </g>
    <circle cx="150" cy="150" r="62" fill="#2C3549" stroke="#4A5470" stroke-width="3"/>
    <circle cx="150" cy="150" r="20" fill="#232B3E" stroke="#4A5470" stroke-width="3"/>
  </g>

  <!-- small gear -->
  <g class="gear-small">
    <g fill="#4A5470">
      <rect x="252" y="52" width="12" height="18" rx="3"/>
      <rect x="252" y="122" width="12" height="18" rx="3"/>
      <rect x="214" y="90" width="18" height="12" rx="3"/>
      <rect x="284" y="90" width="18" height="12" rx="3"/>
      <rect x="252" y="52" width="12" height="18" rx="3" transform="rotate(45 258 96)"/>
      <rect x="252" y="122" width="12" height="18" rx="3" transform="rotate(45 258 96)"/>
      <rect x="214" y="90" width="18" height="12" rx="3" transform="rotate(45 258 96)"/>
      <rect x="284" y="90" width="18" height="12" rx="3" transform="rotate(45 258 96)"/>
    </g>
    <circle cx="258" cy="96" r="34" fill="#323C54" stroke="#5A6584" stroke-width="3"/>
    <circle cx="258" cy="96" r="11" fill="#232B3E" stroke="#5A6584" stroke-width="3"/>
  </g>

  <!-- robot arm -->
  <rect x="428" y="258" width="84" height="20" rx="6" fill="#3B4459"/>
  <rect x="452" y="234" width="36" height="28" rx="6" fill="#4A5470"/>
  <g class="arm-upper">
    <rect x="458" y="126" width="24" height="120" rx="10" fill="#5A6584"/>
    <circle cx="470" cy="240" r="15" fill="#2C3549" stroke="#7A85A4" stroke-width="3"/>
    <g class="arm-fore">
      <rect x="360" y="118" width="118" height="22" rx="10" fill="#7A85A4"/>
      <circle cx="470" cy="130" r="12" fill="#2C3549" stroke="#9AA5C0" stroke-width="3"/>
      <!-- gripper -->
      <path d="M362 118 L340 104 M362 140 L340 152" stroke="#9AA5C0" stroke-width="8" stroke-linecap="round" fill="none"/>
      <!-- spark at gripper -->
      <g class="spark">
        <path d="M332 122 l-10 -8 M330 130 l-13 1 M333 138 l-10 9" stroke="#E8734F" stroke-width="3" stroke-linecap="round"/>
        <circle cx="336" cy="129" r="4" fill="#E8734F"/>
      </g>
    </g>
  </g>

  <!-- beacon light -->
  <circle class="beacon" cx="470" cy="228" r="4.5" fill="#E8734F"/>

  <!-- workpiece: half-built block wall -->
  <g fill="#2C3549" stroke="#4A5470" stroke-width="2">
    <rect x="60" y="262" width="44" height="22" rx="4"/>
    <rect x="108" y="262" width="44" height="22" rx="4"/>
    <rect x="84" y="238" width="44" height="22" rx="4"/>
  </g>
</svg>
</div>

</html>
